<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Firma Correo</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Firma Correo</h1>
    <p>Llena con tus datos</p>
  </div>

  <div class="field">
    <label>Nombre(s)</label>
    <input id="nombre">
  </div>

  <div class="field">
    <label>Apellido Paterno</label>
    <input id="apellidoPaterno">
  </div>

  <div class="field">
    <label>Apellido Materno</label>
    <input id="apellidoMaterno">
  </div>

  <div class="field">
    <label for="opciones">Puesto</label>
      <select name="opciones" id="puesto">
        <option value="" selected disabled>-- Selecciona un puesto --</option>
        <option value="Talent Factory">Talent Factory</option>
      </select>
  </div>

  <div class="field">
    <label for="opciones">División</label>
      <select name="opciones" id="zona">
        <option value="" selected disabled>-- Selecciona una zona --</option>
        <option value="Centro">Centro</option>
        <option value="Noroeste">Noroeste</option>
        <option value="Norte">Norte</option>
        <option value="Occidente">Occidente</option>
        <option value="Sureste">Sureste</option>
        <option value="Valle">Valle</option>
      </select>
  </div>

  <div class="field">
    <label>Teléfono</label>
    <input id="telefono">
  </div>

  <div class="field">
    <label>Correo</label>
    <input id="correo">
  </div>

  <div class="field">
    <label>Dirección CEDIS</label>
    <input id="direccion">
  </div>

  <div class="field">
    <label>Selecciona el diseño</label>

    <div class="image-picker">
      <div class="opciones-container">
        <label class="selector-imagen">
          <input type="radio" name="opcion" value="Images/1.jpg" checked>
          <img src="Images/1.jpg" loading="lazy" alt="Logo 1">
        </label>
        <label class="selector-imagen">
          <input type="radio" name="opcion" value="Images/2.jpg">
          <img src="Images/2.jpg" loading="lazy" alt="Logo 2">
        </label>
        <label class="selector-imagen">
          <input type="radio" name="opcion" value="Images/3.jpg">
          <img src="Images/3.jpg" loading="lazy" alt="Logo 3">
        </label>
        <label class="selector-imagen">
          <input type="radio" name="opcion" value="Images/4.jpg">
          <img src="Images/4.jpg" loading="lazy" alt="Logo 4">
        </label>
        <label class="selector-imagen">
          <input type="radio" name="opcion" value="Images/5.jpg">
          <img src="Images/5.jpg" loading="lazy" alt="Logo 5">
        </label>
        <label class="selector-imagen">
          <input type="radio" name="opcion" value="Images/6.jpg">
          <img src="Images/6.jpg" loading="lazy" alt="Logo 6">
        </label>
      </div>
    </div>
  </div>

  <button class="btn" onclick="generarFirma()">Generar Firma</button>

  <h3>Vista previa</h3>
  <div id="preview" class="preview"></div>

  <button class="btn secondary" onclick="copiarFirma()">Copiar firma</button>

  <textarea id="htmlOutput" style="position:absolute;left:-9999px;"></textarea>
</div>

<script src="js/templates.js"></script>
<script src="js/app.js"></script>
</body>
</html>
